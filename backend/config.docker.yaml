# FilaMama Configuration — Docker defaults
# Most values are overridden by environment variables in Docker.
# This file provides the structure and any non-overridden defaults.

server:
  host: "0.0.0.0"
  port: 1031

# Overridden by FILAMAMA_ROOT_PATH=/browse
root_path: "/browse"

# No mounts by default in Docker — users bind-mount their own paths
mounts: []

# Overridden by FILAMAMA_DATA_DIR=/data
thumbnails:
  enabled: true
  cache_dir: "/data/thumbnails"
  sizes:
    thumb: 256
    large: 1080
  quality: 85
  max_cache_size_mb: 500

transcoding:
  cache_dir: "/data/transcoded"
  max_cache_size_mb: 2000
  max_concurrent: 2
  transcode_timeout: 3600

upload:
  max_size_mb: 10240
  chunk_size_mb: 10

file_types:
  image: ["jpg", "jpeg", "jfif", "png", "gif", "webp", "svg", "bmp", "ico", "tiff", "tif", "avif", "heic", "heif"]
  video: ["mp4", "mkv", "avi", "mov", "webm", "flv", "wmv", "m4v"]
  audio: ["mp3", "wav", "flac", "aac", "ogg", "m4a", "wma", "opus"]
  document: ["pdf", "doc", "docx", "xls", "xlsx", "ppt", "pptx", "odt", "ods"]
  code: ["py", "js", "ts", "tsx", "jsx", "html", "css", "json", "yaml", "yml", "md", "sh", "go", "rs", "java", "c", "cpp", "h"]
  archive: ["zip", "tar", "gz", "bz2", "xz", "7z", "rar"]
  text: ["txt", "log", "csv", "ini", "cfg", "conf"]
  ebook: ["epub", "mobi", "azw", "azw3", "fb2"]
