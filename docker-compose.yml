services:
  filamama:
    build: .
    ports:
      - "1031:1031"
    volumes:
      - ${BROWSE_PATH:-~/}:/browse
      - filamama-data:/data
    environment:
      - FILAMAMA_ROOT_PATH=/browse
      - FILAMAMA_DATA_DIR=/data
      - FILAMAMA_ALLOW_INSECURE=true
    restart: unless-stopped

volumes:
  filamama-data:
